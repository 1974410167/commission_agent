services:
  postgres:
    image: postgres:16
    container_name: commission-agent-postgres
    environment:
      - POSTGRES_DB=commission_agent
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.2
    container_name: commission-agent-es
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - es_data:/usr/share/elasticsearch/data

  kibana:
    image: docker.elastic.co/kibana/kibana:8.17.2
    container_name: commission-agent-kibana
    depends_on:
      - elasticsearch
    environment:
      - SERVER_NAME=commission-agent-kibana
      - SERVER_HOST=0.0.0.0
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - MONITORING_UI_CONTAINER_ELASTICSEARCH_ENABLED=true
      - TELEMETRY_ENABLED=false
      - NEWSFEED_ENABLED=false
    ports:
      - "5601:5601"

  qdrant:
    image: qdrant/qdrant:v1.13.2
    container_name: commission-agent-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  postgres_data:
  es_data:
  qdrant_data:
